# Build the Vite app and publish dist/ to GitHub Pages.
#
# Deploys on every push to main (and manually via the Actions tab).
# The site serves at https://<owner>.github.io/<repo>/, so the build
# passes --base=/<repo>/ — asset URLs are wrong without it.
#
# One-time setup before the first run: Settings → Pages → Build and
# deployment → Source: "GitHub Actions". The default workflow token is
# not allowed to create the Pages site itself (configure-pages fails
# with "Resource not accessible by integration"), so the source must be
# flipped by hand once; every run after that is fully automatic.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/configure-pages@v5
      - run: npm ci
      - run: npm test
      # npm appends extra args after the script text, so the flag lands on
      # `vite build` (the last command in the "build" script chain).
      - run: npm run build -- --base=/${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
